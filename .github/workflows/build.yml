name: Build & Test

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  # ── Host-side unit tests (gcc only, no GBDK needed) ─────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # pulls in tests/unity

      - name: Run tests
        run: make test

  # ── ROM build (requires GBDK) ────────────────────────────────────────
  build:
    name: ROM Build
    runs-on: ubuntu-latest
    env:
      GBDK_VERSION: "4.3.0"
      GBDK_HOME: ${{ github.workspace }}/gbdk
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache GBDK
        id: cache-gbdk
        uses: actions/cache@v4
        with:
          path: gbdk
          key: gbdk-${{ env.GBDK_VERSION }}-linux

      - name: Download GBDK
        if: steps.cache-gbdk.outputs.cache-hit != 'true'
        run: |
          curl -L "https://github.com/gbdk-2020/gbdk-2020/releases/download/${GBDK_VERSION}/gbdk-linux64.tar.gz" \
            -o gbdk.tar.gz
          mkdir -p gbdk
          tar -xzf gbdk.tar.gz -C gbdk --strip-components=1

      - name: Build ROM
        run: make

      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuke-raider-${{ github.sha }}
          path: build/nuke-raider.gb
          if-no-files-found: error
